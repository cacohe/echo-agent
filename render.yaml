# Render Blueprint
# Deploys Echo Backend API as a Render Web Service

services:
  - type: web
    name: echo-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.main:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
