# Render Blueprint
# Deploys Echo Backend API and Web Frontend

services:
  - type: web
    name: echo-api
    env: python
    region: oregon
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.main:app --bind 0.0.0.0:$PORT --workers 1 --worker-class uvicorn.workers.UvicornWorker --threads 4
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: LLM_PROVIDER
        value: minimax
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL
        value: M2-her
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.com
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: echo-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: .next
    headers:
      - path: /.*
        name: Access-Control-Allow-Origin
        value: "*"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://echo-api-v7zo.onrender.com
